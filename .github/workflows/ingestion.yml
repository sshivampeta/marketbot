name: Scheduled Ingestion

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run ingestion against deployed engine
        env:
          ENGINE_URL: ${{ secrets.ENGINE_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'marketbot-github-action@example.com' }}
        run: npm run ingest -w @marketbot/scheduler
